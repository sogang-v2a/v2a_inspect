services:
  v2a-inspect:
    build:
      context: .
      dockerfile: ./Dockerfile
    image: ${V2A_INSPECT_IMAGE:-v2a_inspect:local}
    restart: unless-stopped

    labels:
      - "com.centurylinklabs.watchtower.enable=true"

    ports:
      - "8501:8501"

    environment:
      LANGFUSE_BASE_URL: ${LANGFUSE_BASE_URL:-https://langfuse.riverfog7.com}
      LANGFUSE_PROMPT_LABEL: ${LANGFUSE_PROMPT_LABEL:-production}

      AUTH_MODE: password
      AUTH_CREDENTIALS_PATH: /data/credentials.yaml

      PROMPT_BACKEND: local
      RUNTIME_MODE: nvidia_docker
      SERVER_BASE_URL: http://v2a-inspect-server:8080
      SHARED_VIDEO_DIR: /data/uploads
      RUNTIME_PROFILE: mig10_safe

      STREAMLIT_SERVER_HEADLESS: "true"
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"

    secrets:
      - gemini_api_key
      - langfuse_public_key
      - langfuse_secret_key
      - auth_cookie_key

    volumes:
      - v2a_inspect_data:/data
    depends_on:
      - v2a-inspect-server

    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health').read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  v2a-inspect-server:
    build:
      context: .
      dockerfile: ./server/Dockerfile
    image: ${V2A_INSPECT_SERVER_IMAGE:-v2a_inspect_server:local}
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      RUNTIME_MODE: nvidia_docker
      SERVER_BIND_HOST: 0.0.0.0
      SERVER_BIND_PORT: 8080
      SHARED_VIDEO_DIR: /data/uploads
      MODEL_CACHE_DIR: /data/model-cache
      WEIGHTS_MANIFEST_PATH: /app/server/model-manifest.json
      MINIMUM_GPU_VRAM_GB: 10
      RUNTIME_PROFILE: mig10_safe
      HF_TOKEN: ${HF_TOKEN:-}
    gpus: all
    secrets:
      - gemini_api_key
    volumes:
      - v2a_inspect_data:/data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz').read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  v2a_inspect_data:

secrets:
  gemini_api_key:
    file: ${GEMINI_API_KEY_SECRET_FILE:-./secrets/gemini_api_key}
  langfuse_public_key:
    file: ${LANGFUSE_PUBLIC_KEY_SECRET_FILE:-./secrets/langfuse_public_key}
  langfuse_secret_key:
    file: ${LANGFUSE_SECRET_KEY_SECRET_FILE:-./secrets/langfuse_secret_key}
  auth_cookie_key:
    file: ${AUTH_COOKIE_KEY_SECRET_FILE:-./secrets/auth_cookie_key}
